<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dodge — SNN vs MLP</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b23; --border: #2a3140; --text: #dce3ee;
    --dim: #8a94a6; --accent: #4a90d9; --agent: #3ddc84; --obstacle: #e05555;
    --warn: #e0b23e;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, "SF Pro Text", Segoe UI, sans-serif;
    display: flex; min-height: 100vh; align-items: center; justify-content: center;
  }
  .wrap { display: flex; gap: 24px; padding: 24px; flex-wrap: wrap; justify-content: center; }
  canvas { background: #10141b; border: 1px solid var(--border); border-radius: 10px; cursor: crosshair; }
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px; width: 300px; display: flex; flex-direction: column; gap: 14px;
  }
  h1 { font-size: 16px; font-weight: 600; }
  h1 span { color: var(--dim); font-weight: 400; font-size: 12px; display: block; }
  .row { display: flex; gap: 8px; align-items: center; justify-content: space-between; }
  .models { display: flex; gap: 6px; }
  .models button { flex: 1; }
  button {
    background: #1e2530; color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 10px; cursor: pointer; font: inherit; font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger.active { background: var(--obstacle); border-color: var(--obstacle); }
  label { color: var(--dim); font-size: 12px; }
  input[type=range] { width: 130px; accent-color: var(--accent); }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: #10141b; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
  .stat .v { font-size: 20px; font-weight: 600; }
  .stat .k { font-size: 11px; color: var(--dim); }
  .hint { color: var(--dim); font-size: 12px; }
  #msg { color: var(--warn); font-size: 12px; min-height: 18px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--obstacle); display: inline-block; margin-right: 6px; }
  .dot.on { background: var(--agent); }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="560" height="560"></canvas>
  <div class="panel">
    <h1>Obstacle Dodge <span>SNN vs MLP policy viewer</span></h1>

    <div>
      <label>Policy</label>
      <div class="models">
        <button data-model="mlp1">MLP&nbsp;1f</button>
        <button data-model="mlp3">MLP&nbsp;3f</button>
        <button data-model="snn">SNN</button>
      </div>
    </div>

    <div class="row">
      <button id="pause" style="flex:1">Pause</button>
      <button id="reset" style="flex:1">Reset</button>
    </div>

    <div class="row">
      <label>Tick speed</label>
      <input id="speed" type="range" min="40" max="800" step="10" value="250">
      <span id="speedv" class="hint">250ms</span>
    </div>
    <div class="row">
      <label>Spawn rate</label>
      <input id="spawn" type="range" min="0" max="60" step="1" value="15">
      <span id="spawnv" class="hint">0.15</span>
    </div>
    <div class="row">
      <label><span class="dot on" id="spawndot"></span>Auto-spawn</label>
      <button id="spawntoggle" class="active">On</button>
    </div>

    <div class="stats">
      <div class="stat"><div class="v" id="steps">0</div><div class="k">steps survived</div></div>
      <div class="stat"><div class="v" id="last">—</div><div class="k">last run</div></div>
      <div class="stat"><div class="v" id="nobs">0</div><div class="k">obstacles</div></div>
      <div class="stat"><div class="v" id="sparsity">—</div><div class="k">spike sparsity</div></div>
    </div>

    <div class="hint">Click any <b>edge tile</b> to drop an obstacle heading inward — try lining several up.</div>
    <div id="msg"></div>
  </div>
</div>

<script>
const G = 10, cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const CELL = cv.width / G;
let ws, state = null, prev = {agent: null, obstacles: {}}, tickStart = 0, tickMs = 250;
let deathFlash = 0;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = e => {
    const s = JSON.parse(e.data);
    if (s.error) { msg(s.error); return; }
    if (state) {
      const wasAlive = state.alive;
      prev = {agent: state.agent, obstacles: {}};
      for (const o of state.obstacles) prev.obstacles[o.id] = [o.x, o.y];
      if (wasAlive && !s.alive) deathFlash = performance.now();
      if (!state.alive && s.alive) prev = {agent: s.agent, obstacles: {}}; // fresh episode, no lerp
    }
    state = s; tickStart = performance.now(); tickMs = s.tick_ms;
    updatePanel(s);
  };
  ws.onclose = () => { msg('disconnected — retrying…'); setTimeout(connect, 1000); };
}
connect();

function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }
function msg(t) { const el = document.getElementById('msg'); el.textContent = t; setTimeout(() => { if (el.textContent === t) el.textContent = ''; }, 3500); }

// ---- controls
document.querySelectorAll('[data-model]').forEach(b => b.onclick = () => {
  send({cmd: 'model', model: b.dataset.model});
});
const pauseBtn = document.getElementById('pause');
pauseBtn.onclick = () => send({cmd: state && state.paused ? 'resume' : 'pause'});
document.getElementById('reset').onclick = () => send({cmd: 'reset'});
document.getElementById('speed').oninput = e => {
  document.getElementById('speedv').textContent = e.target.value + 'ms';
  send({cmd: 'speed', ms: +e.target.value});
};
document.getElementById('spawn').oninput = e => {
  const p = e.target.value / 100;
  document.getElementById('spawnv').textContent = p.toFixed(2);
  send({cmd: 'spawn_prob', p});
};
const spawnToggle = document.getElementById('spawntoggle');
spawnToggle.onclick = () => {
  const on = !spawnToggle.classList.contains('active');
  send({cmd: 'spawn_enabled', on});
};

cv.onclick = e => {
  const r = cv.getBoundingClientRect();
  const x = Math.floor((e.clientX - r.left) / r.width * G);
  const y = Math.floor((e.clientY - r.top) / r.height * G);
  if (x < 0 || x >= G || y < 0 || y >= G) return;
  const onEdge = x === 0 || x === G - 1 || y === 0 || y === G - 1;
  if (!onEdge) { msg('click an edge tile to drop an obstacle'); return; }
  // heading inward; corners resolve to the nearer axis (ties go horizontal)
  let dx = 0, dy = 0;
  const dl = x, dr = G - 1 - x, dt = y, db = G - 1 - y;
  const m = Math.min(dl, dr, dt, db);
  if (m === dl) dx = 1; else if (m === dr) dx = -1; else if (m === dt) dy = 1; else dy = -1;
  send({cmd: 'drop', x, y, dx, dy});
};

function updatePanel(s) {
  document.getElementById('steps').textContent = s.steps;
  document.getElementById('last').textContent = s.last_survival ?? '—';
  document.getElementById('nobs').textContent = s.obstacles.length;
  document.getElementById('sparsity').textContent =
    s.sparsity == null ? '—' : (s.sparsity * 100).toFixed(1) + '%';
  pauseBtn.textContent = s.paused ? 'Resume' : 'Pause';
  pauseBtn.classList.toggle('active', !s.paused);
  spawnToggle.textContent = s.spawn_enabled ? 'On' : 'Off';
  spawnToggle.classList.toggle('active', s.spawn_enabled);
  document.getElementById('spawndot').classList.toggle('on', s.spawn_enabled);
  document.querySelectorAll('[data-model]').forEach(b =>
    b.classList.toggle('active', b.dataset.model === s.model));
  if (!s.model) msg('pick a policy to start');
}

// ---- rendering (interpolated; sim stays discrete server-side)
function lerp(a, b, t) { return a + (b - a) * t; }

function draw() {
  requestAnimationFrame(draw);
  ctx.clearRect(0, 0, cv.width, cv.height);

  // grid
  ctx.strokeStyle = '#1c222d';
  for (let i = 0; i <= G; i++) {
    ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, cv.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(cv.width, i * CELL); ctx.stroke();
  }
  // edge hint
  ctx.fillStyle = 'rgba(74,144,217,0.05)';
  ctx.fillRect(0, 0, cv.width, CELL); ctx.fillRect(0, cv.height - CELL, cv.width, CELL);
  ctx.fillRect(0, 0, CELL, cv.height); ctx.fillRect(cv.width - CELL, 0, CELL, cv.height);

  if (!state) return;
  const t = Math.min(1, (performance.now() - tickStart) / tickMs);

  // obstacles
  for (const o of state.obstacles) {
    const p = prev.obstacles[o.id] || [o.x - o.dx, o.y - o.dy]; // new ones slide in
    const x = lerp(p[0], o.x, t), y = lerp(p[1], o.y, t);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--obstacle');
    roundRect(x * CELL + 6, y * CELL + 6, CELL - 12, CELL - 12, 6);
    // motion tail
    ctx.fillStyle = 'rgba(224,85,85,0.25)';
    roundRect((x - o.dx * 0.35) * CELL + 10, (y - o.dy * 0.35) * CELL + 10, CELL - 20, CELL - 20, 6);
  }

  // agent
  const pa = prev.agent || state.agent;
  const ax = lerp(pa[0], state.agent[0], t), ay = lerp(pa[1], state.agent[1], t);
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--agent');
  ctx.beginPath();
  ctx.arc((ax + 0.5) * CELL, (ay + 0.5) * CELL, CELL * 0.32, 0, Math.PI * 2);
  ctx.fill();

  // death flash
  if (deathFlash && performance.now() - deathFlash < 1100) {
    const a = 1 - (performance.now() - deathFlash) / 1100;
    ctx.fillStyle = `rgba(224,85,85,${0.35 * a})`;
    ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = `rgba(255,255,255,${a})`;
    ctx.font = '600 26px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`died after ${state.last_survival ?? state.steps} steps`, cv.width / 2, cv.height / 2);
  }
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r); ctx.fill();
}
draw();
</script>
</body>
</html>
